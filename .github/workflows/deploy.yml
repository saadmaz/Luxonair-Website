name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Build-time env vars (no secrets needed for the build step)
          NODE_ENV: production

      - name: Deploy to Hostinger via SSH
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: ADMIN_USERNAME,ADMIN_PASSWORD_HASH
          script: |
            set -e
            cd ${{ secrets.APP_PATH }}
            git pull origin main
            npm ci --omit=dev
            npm run build
            npm run db:push
            # Update admin credentials in .env from GitHub Secrets
            if [ -n "$ADMIN_USERNAME" ]; then
              sed -i "s|^ADMIN_USERNAME=.*|ADMIN_USERNAME=${ADMIN_USERNAME}|" .env || echo "ADMIN_USERNAME=${ADMIN_USERNAME}" >> .env
            fi
            if [ -n "$ADMIN_PASSWORD_HASH" ]; then
              sed -i "s|^ADMIN_PASSWORD_HASH=.*|ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}|" .env || echo "ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}" >> .env
            fi
            pm2 reload ecosystem.config.cjs --update-env
